name: NuGet Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to pack (for example 0.1.0)"
        required: true
        type: string

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Normalize version
        run: echo "PACKAGE_VERSION=${PACKAGE_VERSION#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: |
          dotnet restore src/OpenClaw.Core
          dotnet restore src/OpenClaw.PluginKit
          dotnet restore src/OpenClaw.SemanticKernelAdapter

      - name: Pack
        run: |
          mkdir -p ./artifacts/nuget
          dotnet pack src/OpenClaw.Core/OpenClaw.Core.csproj -c Release --no-restore -p:PackageVersion=${PACKAGE_VERSION} -o ./artifacts/nuget
          dotnet pack src/OpenClaw.PluginKit/OpenClaw.PluginKit.csproj -c Release --no-restore -p:PackageVersion=${PACKAGE_VERSION} -o ./artifacts/nuget
          dotnet pack src/OpenClaw.SemanticKernelAdapter/OpenClaw.SemanticKernelAdapter.csproj -c Release --no-restore -p:PackageVersion=${PACKAGE_VERSION} -o ./artifacts/nuget

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: nuget-packages-${{ env.PACKAGE_VERSION }}
          path: ./artifacts/nuget
